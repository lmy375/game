<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>阵形之术 — 2D (PixiJS)</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>阵形之术 <small>2D · PixiJS</small></h1>
        <div class="toolbar">
          <label>关卡(调试)：<select id="level-select"></select></label>
          <span id="turn" class="turn"></span>
          <button id="end-turn">结束行动 ⏭</button>
        </div>
      </header>

      <div id="hint" class="hint"></div>

      <main>
        <div class="board-wrap" id="board-wrap">
          <div id="stage"></div>
          <div id="unit-menu" class="unit-menu"></div>
          <div id="confirm-bar" class="confirm-bar"></div>
          <div id="banner" class="banner"></div>
        </div>

        <aside class="side">
          <section class="panel">
            <h2>单位</h2>
            <div id="info" class="info"></div>
          </section>
          <section class="panel grow">
            <h2>战斗日志</h2>
            <div id="log" class="log"></div>
          </section>
        </aside>
      </main>

      <footer>
        蓝=可移动 · 黄=施法范围 · 橙/红=AOE命中 · 箭头=位移 · 虚线框=落点 · ☠=可击杀 · 右键取消
      </footer>
    </div>
    <div id="screen-root" class="screen-root"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
